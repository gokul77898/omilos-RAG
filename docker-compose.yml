# OmilosRAG — Full Stack (Production)
# Usage: cp .env.example .env && docker compose up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: omilosrag-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: omilosrag
    ports:
      - "5433:5432"
    volumes:
      - omilosrag_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: omilosrag-chromadb
    ports:
      - "8002:8000"
    volumes:
      - omilosrag_chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: omilosrag-backend
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    env_file: .env
    environment:
      # Override for Docker internal networking
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/omilosrag
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    volumes:
      - omilosrag_uploads:/app/backend/uploads
      - omilosrag_data:/app/backend/data
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # Needed on Linux so Ollama (on host) is reachable at host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: omilosrag-mcp-server
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_BASE_URL: http://backend:8080/api/v1
      TRANSPORT: http
      PORT: "8000"
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: omilosrag-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5174:80"
    restart: unless-stopped

volumes:
  omilosrag_postgres_data:
  omilosrag_chroma_data:
  omilosrag_uploads:
  omilosrag_data:
